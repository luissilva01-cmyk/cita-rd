    <!-- P conectada con curva suave -->
    <path d="M 90 10 L 120 10 C 170 10 190 30 190 60 C 190 90 170 110 120 110 L 100 110 L 100 120 C 100 130 95 135 85 135 C 75 135 70 130 70 120 L 70 20 C 70 15 75 10 80 10 L 90 10 Z M 100 40 L 100 80 L 120 80 C 145 80 155 70 155 60 C 155 50 145 40 120 40 L 100 40 Z" fill="url(#tapati-gradient)" stroke="none"/>
  </g>
  
  <!-- Texto "Ta' Pa' Ti" debajo -->
