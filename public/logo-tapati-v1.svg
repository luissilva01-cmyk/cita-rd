      <stop offset="0%" style="stop-color:#EC4913;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FF8052;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6B9D;stop-opacity:1" />
